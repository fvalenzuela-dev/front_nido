name: Reporte de bug
description: Reportá un bug de Fvalenzuela
labels: ["bug", "status:needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📋 Cómo funciona

        1. **Enviá** este reporte de bug → recibirá automáticamente la etiqueta `status:needs-review`
        2. Una persona mantenedora lo revisará y agregará `status:approved` (o lo cerrará como inválido/duplicado)
        3. **Recién entonces** deberías abrir un PR para corregirlo

        Los PRs que corrijan issues sin `status:approved` serán rechazados automáticamente.

  - type: checkboxes
    id: preflight
    attributes:
      label: Checklist previa
      options:
        - label: Busqué en los issues existentes y esto no es un duplicado
          required: true
        - label: Entiendo que los PRs serán rechazados si el issue vinculado no tiene `status:approved`
          required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Descripción del bug
      description: Una descripción clara y concisa del bug.
      placeholder: Describí el bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Pasos para reproducir
      description: Pasos necesarios para reproducir el comportamiento.
      value: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Comportamiento esperado
      description: ¿Qué esperabas que ocurriera?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Comportamiento actual
      description: ¿Qué ocurrió realmente?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🖥️ Entorno

  - type: input
    id: version
    attributes:
      label: Versión de Fvalenzuela
      description: Ejecutá `gga version` para obtener este dato
      placeholder: "ej. v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Sistema operativo
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Arch/Manjaro)
        - Linux (Fedora/RHEL)
        - Linux (Other)
        - Windows
        - Windows (WSL)
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agente / cliente de IA
      description: ¿Qué agente o cliente de IA estás usando?
      options:
        - Claude Code
        - OpenCode
        - Gemini CLI
        - Cursor
        - Windsurf
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 📋 Área afectada
      options:
        - CLI (comandos, flags)
        - TUI (interfaz de terminal)
        - Pipeline de instalación
        - Detección de agentes
        - Detección del sistema
        - Catálogo/steps
        - Documentación
        - Otro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 💡 Logs / salida de error
      description: Pegá cualquier log relevante. Se formateará automáticamente como código.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Agregá cualquier otro contexto sobre el problema (capturas, archivos de configuración, etc.)
    validations:
      required: false
